name: Tag Release

run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: tag-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-windows:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Check out the tagged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Resolve the release tag version
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          release_tag="${GITHUB_REF_NAME}"
          release_display_version="${release_tag#v}"

          if [ -z "$release_display_version" ] || [ "$release_display_version" = "$release_tag" ]; then
            echo "The release tag must start with 'v' and include a version." >&2
            exit 1
          fi

          if [[ "$release_display_version" =~ ^([0-9]{4})([0-9]{2})([0-9]{2})\.([0-9]+)$ ]]; then
            release_year=$((10#${BASH_REMATCH[1]}))
            release_month=$((10#${BASH_REMATCH[2]}))
            release_day=$((10#${BASH_REMATCH[3]}))
            release_sequence=$((10#${BASH_REMATCH[4]}))

            if [ "$release_sequence" -gt 999 ]; then
              echo "Warning: release_sequence $release_sequence exceeds 999, capping to 999" >&2
              release_sequence=999
            fi

            release_app_version="$((release_year % 100)).${release_month}.${release_day}${release_sequence}"
          elif [[ "$release_display_version" =~ ^([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            major=$(echo "$release_display_version" | cut -d. -f1)
            minor=$(echo "$release_display_version" | cut -d. -f2)
            patch=$(echo "$release_display_version" | cut -d. -f3)

            if [ "$major" -gt 255 ] || [ "$minor" -gt 255 ] || [ "$patch" -gt 65535 ]; then
              echo "Error: Version components exceed limits (major<=255, minor<=255, patch<=65535)." >&2
              exit 1
            fi

            release_app_version="$release_display_version"
          else
            echo "The release tag must resolve to YYYYMMDD.N or semver (for example, 1.2.3)." >&2
            exit 1
          fi

          {
            echo "release_tag=$release_tag"
            echo "release_display_version=$release_display_version"
            echo "release_app_version=$release_app_version"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare the desktop release payload
        id: prepare
        uses: ./.github/actions/desktop-release-prepare
        with:
          release_version: ${{ steps.meta.outputs.release_app_version }}

      - name: Compose release metadata
        id: release_meta
        shell: bash
        run: |
          {
            echo "release_body<<EOF"
            echo "## Release Metadata"
            echo
            echo "- Release tag: \`${{ steps.meta.outputs.release_tag }}\`"
            echo "- Release version: \`${{ steps.meta.outputs.release_display_version }}\`"
            echo "- Bundled app version: \`${{ steps.meta.outputs.release_app_version }}\`"
            echo "- Target SHA: \`${{ github.sha }}\`"
            echo "- Triggered by: \`${{ github.event_name }}\`"
            echo "- Bundled Go sidecar: \`${{ steps.prepare.outputs.sidecar_file_name }}\`"
            echo "- Preferred Windows installer: NSIS \`.exe\`"
            echo "- Secondary Windows installer: \`.msi\`"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and publish the tagged release
        id: publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm exec tauri
          tagName: ${{ steps.meta.outputs.release_tag }}
          releaseName: ${{ steps.meta.outputs.release_tag }}
          releaseBody: ${{ steps.release_meta.outputs.release_body }}
          releaseCommitish: ${{ github.sha }}
          generateReleaseNotes: true
          retryAttempts: 2
          args: --bundles nsis,msi

      - name: Write release summary
        shell: bash
        run: |
          {
            echo "## Published Tagged Release"
            echo
            echo "- Release URL: ${{ steps.publish.outputs.releaseHtmlUrl }}"
            echo "- Release ID: \`${{ steps.publish.outputs.releaseId }}\`"
            echo "- App version: \`${{ steps.publish.outputs.appVersion }}\`"
            echo "- Target SHA: \`${{ github.sha }}\`"
            echo "- Bundled Go sidecar: \`${{ steps.prepare.outputs.sidecar_file_name }}\`"
            if [ -n "${{ steps.publish.outputs.artifactPaths }}" ]; then
              echo "- Uploaded assets:"
              while IFS= read -r asset; do
                if [ -n "$asset" ]; then
                  echo "  - \`$asset\`"
                fi
              done <<'EOF'
          ${{ steps.publish.outputs.artifactPaths }}
          EOF
            fi
          } >> "$GITHUB_STEP_SUMMARY"
