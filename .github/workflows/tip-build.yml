name: Tip Build

run-name: >-
  Tip Build (${{
    github.event_name == 'push' && github.sha || github.ref_name
  }})

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tip-build
  cancel-in-progress: true

jobs:
  release-tip:
    if: github.ref == 'refs/heads/main'
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Check out the current main commit
        uses: actions/checkout@v4

      - name: Resolve the tip build version and compare link
        id: meta
        shell: pwsh
        env:
          PREVIOUS_SHA: ${{ github.event.before }}
        run: |
          $shortSha = $env:GITHUB_SHA.Substring(0, 7)
          $packageJson = Get-Content 'apps/desktop/package.json' -Raw | ConvertFrom-Json
          $baseVersion = $packageJson.version
          $tipVersion = "$baseVersion-tip.$env:GITHUB_RUN_NUMBER"
          $compareUrl = "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/commits/$env:GITHUB_SHA"

          if (-not [string]::IsNullOrWhiteSpace($env:PREVIOUS_SHA) -and $env:PREVIOUS_SHA -ne '0000000000000000000000000000000000000000') {
            $compareUrl = "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/compare/$env:PREVIOUS_SHA...$env:GITHUB_SHA"
          }

          "base_version=$baseVersion" >> $env:GITHUB_OUTPUT
          "tip_version=$tipVersion" >> $env:GITHUB_OUTPUT
          "short_sha=$shortSha" >> $env:GITHUB_OUTPUT
          "compare_url=$compareUrl" >> $env:GITHUB_OUTPUT

      - name: Prepare the desktop release payload
        id: prepare
        uses: ./.github/actions/desktop-release-prepare
        with:
          release_version: ${{ steps.meta.outputs.tip_version }}

      - name: Replace the previous tip release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release delete tip --yes --cleanup-tag || true
          git push origin :refs/tags/tip || true

      - name: Compose tip release metadata
        id: release_meta
        shell: bash
        run: |
          {
            echo "release_body<<EOF"
            echo "## Tip Build Metadata"
            echo
            echo "- Release tag: \`tip\`"
            echo "- Release name: \`tip (${{ steps.meta.outputs.short_sha }})\`"
            echo "- Tip build version: \`${{ steps.meta.outputs.tip_version }}\`"
            echo "- Base desktop version: \`${{ steps.meta.outputs.base_version }}\`"
            echo "- Target SHA: \`${{ github.sha }}\`"
            echo "- Triggered by: \`${{ github.event_name }}\`"
            echo "- Bundled Go sidecar: \`${{ steps.prepare.outputs.sidecar_file_name }}\`"
            echo "- Preferred Windows installer: NSIS \`.exe\`"
            echo "- Secondary Windows installer: \`.msi\`"
            echo "- Compare: ${{ steps.meta.outputs.compare_url }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and publish the tip release
        id: publish
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: tip
          releaseName: tip (${{ steps.meta.outputs.short_sha }})
          releaseBody: ${{ steps.release_meta.outputs.release_body }}
          releaseCommitish: ${{ github.sha }}
          prerelease: true
          retryAttempts: 2
          args: --bundles nsis,msi

      - name: Write tip release summary
        shell: bash
        run: |
          {
            echo "## Published Tip Build"
            echo
            echo "- Release URL: ${{ steps.publish.outputs.releaseHtmlUrl }}"
            echo "- Release ID: \`${{ steps.publish.outputs.releaseId }}\`"
            echo "- App version: \`${{ steps.publish.outputs.appVersion }}\`"
            echo "- Target SHA: \`${{ github.sha }}\`"
            echo "- Bundled Go sidecar: \`${{ steps.prepare.outputs.sidecar_file_name }}\`"
            if [ -n "${{ steps.publish.outputs.artifactPaths }}" ]; then
              echo "- Uploaded assets:"
              while IFS= read -r asset; do
                if [ -n "$asset" ]; then
                  echo "  - \`$asset\`"
                fi
              done <<'EOF'
          ${{ steps.publish.outputs.artifactPaths }}
          EOF
            fi
          } >> "$GITHUB_STEP_SUMMARY"
